<body>
    <main>
<section class="slider container-fluid px-5 py-5" id="slider">
    <div class="slider-content">
      <div class="container px-2 py-2">
        <div id="movieCarousel" class="carousel slide" data-bs-ride="carousel">
          <!-- Carousel inner -->
          <div class="carousel-inner">
            <div class="carousel-item active" id="slide1">
              <div class="card position-relative">
                <img src="https://raw.githubusercontent.com/AMALIK8989/Ivflix1.0/main/img/Atomic%20Blonde.png" alt="Atomic Blonde" class="d-block w-100">
                <div class="card-details position-absolute bottom-0 start-0 w-100 p-3 bg-dark text-white opacity-0 hover-opacity-100">
                  <h3>Atomic Blonde</h3>
                  <p>"Atomic Blonde" is a thrilling action film set against the backdrop of the Cold War era...</p>
                  <a href="./Atomic-blonde.html"><i class="fas fa-play-circle"></i></a>
                </div>
              </div>
            </div>
            <div class="carousel-item" id="slide2">
              <div class="card position-relative">
                <img src="https://raw.githubusercontent.com/AMALIK8989/Ivflix1.0/main/img/Arrow%20Cover.jpg" alt="Arrow" class="d-block w-100">
                <div class="card-details position-absolute bottom-0 start-0 w-100 p-3 bg-dark text-white opacity-0 hover-opacity-100">
                  <h3>Arrow</h3>
                  <p>"Arrow" follows billionaire vigilante Oliver Queen as he battles crime...</p>
                  <a href="#"><i class="fas fa-play-circle"></i></a>
                </div>
              </div>
            </div>
            <div class="carousel-item" id="slide3">
              <div class="card position-relative">
                <img src="https://raw.githubusercontent.com/AMALIK8989/Ivflix1.0/main/img/Arrow%20Cover.jpg" alt="Mission Impossible" class="d-block w-100">
                <div class="card-details position-absolute bottom-0 start-0 w-100 p-3 bg-dark text-white opacity-0 hover-opacity-100">
                  <h3>Mission Impossible 1</h3>
                  <p>"Mission: Impossible" (1996) is a classic espionage thriller...</p>
                  <a href="#"><i class="fas fa-play-circle"></i></a>
                </div>
              </div>
            </div>
          </div>

          <!-- Pagination -->
          <div class="carousel-indicators">
            <button type="button" data-bs-target="#movieCarousel" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
            <button type="button" data-bs-target="#movieCarousel" data-bs-slide-to="1" aria-label="Slide 2"></button>
            <button type="button" data-bs-target="#movieCarousel" data-bs-slide-to="2" aria-label="Slide 3"></button>
          </div>
        </div>
      </div>
    </div>
