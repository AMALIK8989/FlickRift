name: Compress Images

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write  # Allow GitHub Actions to push changes

jobs:
  image-actions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Optimize Images with Image Actions
        uses: calibreapp/image-actions@1.1.0
        with:
          githubToken: ${{ secrets.GITHUB_TOKEN }}  # Use GitHub token for authentication
          jpegQuality: 80  # Set JPEG compression quality
          pngQuality: 80   # Set PNG compression quality
          webpQuality: 80  # Set WEBP compression quality
          ignorePaths: node_modules/**

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Optimized images using Image Actions" || exit 0
          git push
