name: Compress Images

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write  # Allow GitHub Actions to push changes

jobs:
  optimize-images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          persist-credentials: true  # Allow credentials for pushing changes

      - name: Set up Python
        uses: actions/setup-python@v3
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install pillow

      - name: Run Image Compression
        run: python .github/workflows/compress.py  # Ensure this script exists

      - name: Commit Changes
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git remote set-url origin https://x-access-token:${PAT_TOKEN}@github.com/${{ github.repository }}.git
          git add Assets Assets/Img
          git commit -m "Optimized images in Assets and Assets/Img" || exit 0
          git push origin main

  image-actions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Optimize Images with Image Actions
        uses: calibreapp/image-actions@1.1.0
        with:
          githubToken: ${{ secrets.GITHUB_TOKEN }}  # Use GitHub token for authentication
          jpegQuality: 80  # Default JPEG quality
          pngQuality: 80  # Default PNG quality
          webpQuality: 80  # Default WEBP quality
          ignorePaths: node_modules/**
